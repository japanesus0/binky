# Cloud build pipeline for binky.
#
# - `analyze` runs on every PR and every push to main. Catches breakage
#   before merge.
# - `release` runs on every push to main (and manually via the Actions
#   tab). Produces a signed AAB and uploads it as a GitHub Actions
#   artifact you can download from the workflow run page.
#
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# REQUIRED GITHUB SECRETS (for `release` to succeed)
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
# Set up at: https://github.com/japanesus0/binky/settings/secrets/actions
#
#   KEYSTORE_BASE64    ‚Äî base64-encoded contents of upload-keystore.jks
#                        Generate locally:
#                          [Convert]::ToBase64String([IO.File]::ReadAllBytes(
#                            "C:\Users\akarr\binky-upload.jks"
#                          )) | Set-Clipboard
#                        Then paste into the secret value.
#
#   KEYSTORE_PASSWORD  ‚Äî your keystore's storePassword (from key.properties)
#   KEY_PASSWORD       ‚Äî your key's keyPassword (often same as above)
#   KEY_ALIAS          ‚Äî your key alias (currently "upload")
#
# Until those four secrets exist, the `release` job will fail at the
# decode step. The `analyze` job runs fine without any secrets.
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Static analysis runs on EVERY PR and main push. No secrets needed,
  # so it never fails for keystore reasons. Catches `flutter analyze`
  # warnings/errors before they hit main.
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore pub dependencies
        working-directory: app
        run: flutter pub get

      - name: flutter analyze
        working-directory: app
        run: flutter analyze

  # Signed release build. Only runs on direct pushes to main (i.e. after
  # a PR is merged) and on manual `workflow_dispatch` triggers. Needs
  # the four signing secrets to be configured.
  release:
    name: Build release AAB
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore pub dependencies
        working-directory: app
        run: flutter pub get

      # Reconstruct the keystore from the base64 secret. Stored outside
      # the repo tree so it can't accidentally end up in build outputs.
      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See the comment block at the top of this workflow for setup instructions."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/upload.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore/upload.jks" >> "$GITHUB_ENV"

      - name: Generate key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > app/android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          EOF

      - name: Build release AAB
        working-directory: app
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/symbols

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: binky-aab-${{ github.sha }}
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload Dart obfuscation symbols
        uses: actions/upload-artifact@v4
        with:
          name: binky-symbols-${{ github.sha }}
          path: app/build/symbols/
          retention-days: 90

      # Clean up the keystore + key.properties so they aren't visible
      # in any subsequent step's logs or artifacts. Belt-and-suspenders
      # ‚Äî the runner is ephemeral anyway, but this is cheap.
      - name: Wipe credentials
        if: always()
        run: |
          rm -f "$KEYSTORE_PATH" || true
          rm -f app/android/key.properties || true
